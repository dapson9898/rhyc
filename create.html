<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RHYC Member Registration</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page-register">
  <div class="register-page">
    <section class="register-card">
      <header>
        <h1>RHYC Member Registration</h1>
        <p>Fill in your member details to register. After successful registration you will be redirected to the login page.</p>
      </header>
      <div class="register-body">
        <form id="signup-form">
          <div class="form-grid">
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" placeholder="member@example.com" required />
            </div>
            <div class="form-group">
              <label for="gender">Gender?</label>
              <select id="gender" required>
                <option value="">Select option</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
              </select>
            </div>
            <div class="form-group">
              <label for="firstName">First Name</label>
              <input type="text" id="firstName" placeholder="First name" required />
            </div>
            <div class="form-group">
              <label for="lastName">Last Name</label>
              <input type="text" id="lastName" placeholder="Last name" required />
            </div>
            <div class="form-group full-width">
              <label for="otherNames">Other Names</label>
              <input type="text" id="otherNames" placeholder="Other names (optional)" />
            </div>
            <div class="form-group">
              <label for="phoneNumber">Phone Number</label>
              <input type="tel" id="phoneNumber" placeholder="+234 800 000 0000" required />
            </div>
            <div class="form-group">
              <label for="nationality">Nationality</label>
              <input type="text" id="nationality" value="Nigeria" readonly />
            </div>
            <div class="form-group">
              <label for="stateOfResidence">State of Residence</label>
              <input type="text" id="stateOfResidence" placeholder="e.g. Lagos" required />
            </div>
            <div class="form-group">
              <label for="stateOfOrigin">State of Origin</label>
              <input type="text" id="stateOfOrigin" placeholder="e.g. Ogun" required />
            </div>
            <div class="form-group">
              <label for="localGovernment">Local Government</label>
              <input type="text" id="localGovernment" placeholder="e.g. Ifo" required />
            </div>
            <div class="form-group">
              <label for="ninNationalIDNumber">NIN National ID Number</label>
              <input type="text" id="ninNationalIDNumber" placeholder="NIN number" required />
            </div>
            <div class="form-group">
              <label for="vinvoterIDNumber">VIN Voters' ID Number</label>
              <input type="text" id="vinvoterIDNumber" placeholder="VIN number" required />
            </div>
            <div class="form-group">
              <label for="isApcMemberBoolean">Are you an APC member?</label>
              <select id="isApcMemberBoolean" required>
                <option value="">Select option</option>
                <option value="true">Yes</option>
                <option value="false">No</option>
              </select>
            </div>
            <div class="form-group full-width">
              <label for="password">Password</label>
              <input type="password" id="password" placeholder="At least 6 characters" minlength="6" required />
            </div>
            <div class="form-group full-width">
              <label for="passportPhotoFileupload">Passport Photo</label>
              <input type="file" id="passportPhotoFileupload" accept="image/*" />
              <span class="note">Upload a clear passport photo.</span>
            </div>
          </div>
          <button type="submit" class="btn-submit">Create Member Account</button>
          <div id="message" class="message"></div>
        </form>
        <a href="./dashboard.html" style="text-decoration: none; color: #c0392b; font-weight: bolder; font-size: 1.1rem; font-style: italic; ">Go back</a>
      </div>
    </section>
  </div>

  <script type="module" src="./js/register.js"></script>
</body>
</html>
